<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Minhas Publicações</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

.header{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
}

.back-btn{
  font-size:24px;
  cursor:pointer;
}

.container{
  padding:12px;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
}

.card{
  background:#151515;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-info{
  padding:10px;
}

.card-title{
  font-size:14px;
  font-weight:bold;
}

.card-meta{
  font-size:12px;
  color:#aaa;
  margin-top:4px;
}

.empty{
  text-align:center;
  margin-top:50px;
  color:#777;
}

/* FAB */
.fab{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:#00c853;
  color:black;
  font-size:34px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-box{
  width:90%;
  max-width:400px;
  background:#1b1b1b;
  border-radius:14px;
  padding:18px;
}

.modal-box h3{
  margin-top:0;
  color:#00c853;
}

.modal-box textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#2a2a2a;
  color:white;
  resize:none;
  box-sizing:border-box;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.modal-actions button{
  flex:1;
  border:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.cancel-btn{
  background:#444;
  color:white;
}

.send-btn{
  background:#00c853;
  color:black;
}
</style>
</head>

<body>

<div class="header">

  <div class="back-btn"
  onclick="history.back()">
    ←
  </div>

  <div>
    📦 Minhas Publicações
  </div>

  <div id="nickUser"></div>

</div>

<div class="container">

  <div class="grid" id="grid"></div>

  <div class="empty"
  id="empty"
  style="display:none;">

    Nenhum mod encontrado.

  </div>

</div>

<button class="fab"
onclick="abrirUpload()">
  +
</button>

<!-- MODAL -->
<div class="modal"
id="solicitarModal">

  <div class="modal-box">

    <h3>
      Solicitar Permissão
    </h3>

    <p style="color:#aaa;font-size:13px;">
      Explique porque deseja publicar mods.
    </p>

    <textarea
    id="motivoInput"
    placeholder="Descreva seu objetivo..."></textarea>

    <div class="modal-actions">

      <button class="cancel-btn"
      onclick="fecharModal()">

        Cancelar

      </button>

      <button class="send-btn"
      onclick="enviarSolicitacao()">

        Enviar Solicitação

      </button>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  push,
  get
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey:
  "AIzaSyB5A-ySceXCFRQ7iSCnOA68nRJqYpK6DQc",

  databaseURL:
  "https://dayzozmbi-server-default-rtdb.firebaseio.com",

  projectId:
  "dayzozmbi-server",

  storageBucket:
  "dayzozmbi-server.firebasestorage.app",

  messagingSenderId:
  "221905253103",

  appId:
  "1:221905253103:android:fc1bc06782cf5735c4611a"
};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const usuario =
JSON.parse(
localStorage.getItem("usuarioModSteam")
);

if(!usuario){

  location.href =
  "Login.html";

}

document.getElementById("nickUser")
.innerText = usuario.nick;

/* ABRIR UPLOAD */
window.abrirUpload = async ()=>{

  /* ADM */
  if(usuario.nick === "ADM"){

    location.href =
    "Uplods.html";

    return;

  }

  /* VERIFICAR FIREBASE */
  const snap = await get(
    ref(
      db,
      "usuariosAutorizados/" + usuario.nick
    )
  );

  const autorizado =
  snap.exists();

  /* NÃO AUTORIZADO */
  if(!autorizado){

    document.getElementById(
      "solicitarModal"
    ).style.display = "flex";

    return;

  }

  /* AUTORIZADO */
  location.href =
  "Uplods.html";

};

/* MODAL */
window.fecharModal = ()=>{

  document.getElementById(
    "solicitarModal"
  ).style.display = "none";

};

/* SOLICITAÇÃO */
window.enviarSolicitacao =
async ()=>{

  const motivo =
  document.getElementById(
    "motivoInput"
  ).value;

  if(!motivo){

    return alert(
      "Explique o motivo."
    );

  }

  await push(
    ref(db,"solicitacoesUpload"),
    {

      nick:
      usuario.nick,

      motivo,

      data:
      Date.now(),

      status:
      "pendente"

    }
  );

  alert(
    "Solicitação enviada!"
  );

  fecharModal();

};

/* MODS */
const grid =
document.getElementById("grid");

const empty =
document.getElementById("empty");

onValue(ref(db,"mods"),snap=>{

  grid.innerHTML = "";

  let encontrou = false;

  snap.forEach(i=>{

    const m = i.val();

    if(
      usuario.nick !== "ADM"
      &&
      m.autorNick !== usuario.nick
    ){
      return;
    }

    encontrou = true;

    const card =
    document.createElement("div");

    card.className = "card";

    card.innerHTML = `
      <img src="${m.iconURL}">

      <div class="card-info">

        <div class="card-title">
          ${m.nome}
        </div>

        <div class="card-meta">
          📥 ${m.downloads||0}
        </div>

      </div>
    `;

    card.onclick = ()=>{

      location.href =
      "PaginaVisual.html?id="
      + i.key;

    };

    grid.appendChild(card);

  });

  empty.style.display =
  encontrou ? "none" : "block";

});

</script>

</body>
</html>
