<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Mod</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.back{
  font-size:24px;
  cursor:pointer;
}

h1{
  font-size:20px;
  color:#00c853;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input,
textarea,
select{
  width:100%;
  margin-top:8px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2a2a2a;
  color:white;
  outline:none;
  box-sizing:border-box;
}

textarea{
  height:100px;
  resize:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn-save{
  background:#00c853;
  color:black;
}

.preview{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-top:10px;
}

.preview img{
  width:120px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
  background:#222;
}

.info{
  color:#aaa;
  font-size:13px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="back" onclick="voltar()">←</div>
    <h1>✏️ Editar Mod</h1>
  </div>

  <!-- INFORMAÇÕES -->
  <div class="card">

    <h3>Informações</h3>

    <input id="nome" placeholder="Nome do Mod">

    <textarea id="descricao"
    placeholder="Descrição"></textarea>

    <input id="versao"
    placeholder="Versão">

    <select id="categoria">

      <option>Roupas</option>
      <option>Armas</option>
      <option>Veiculos</option>
      <option>Construções</option>
      <option>Variados</option>

    </select>

  </div>

  <!-- ZIP -->
  <div class="card">

    <h3>📦 Novo Arquivo ZIP</h3>

    <input type="file"
    id="zip"
    accept=".zip">

    <div class="info">
      Se não selecionar outro ZIP,
      o antigo continuará.
    </div>

  </div>

  <!-- ÍCONE -->
  <div class="card">

    <h3>🖼️ Novo Ícone</h3>

    <input type="file"
    id="icone"
    accept="image/*">

    <div class="preview">
      <img id="iconPreview">
    </div>

  </div>

  <!-- IMAGENS -->
  <div class="card">

    <h3>🖼️ Novas Imagens</h3>

    <input type="file"
    id="imagens"
    multiple
    accept="image/*">

    <div class="info">
      Se enviar novas imagens,
      as antigas serão substituídas.
    </div>

    <div class="preview"
    id="imgsPreview"></div>

  </div>

  <!-- SALVAR -->
  <div class="card">

    <button class="btn-save"
    id="saveBtn">

      💾 Salvar Alterações

    </button>

  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref as dbRef,
  get,
  update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
  getStorage,
  ref,
  uploadBytesResumable,
  getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {

  apiKey:
  "AIzaSyB5A-ySceXCFRQ7iSCnOA68nRJqYpK6DQc",

  databaseURL:
  "https://dayzozmbi-server-default-rtdb.firebaseio.com",

  projectId:
  "dayzozmbi-server",

  storageBucket:
  "dayzozmbi-server.firebasestorage.app",

  messagingSenderId:
  "221905253103",

  appId:
  "1:221905253103:android:fc1bc06782cf5735c4611a"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const storage =
getStorage(app);

/* USUÁRIO */
const usuario =
JSON.parse(
localStorage.getItem("usuarioModSteam")
);

if(!usuario){

  alert("Faça login!");

  window.location.href =
  "Login.html";

}

/* ADM */
const isADM =
usuario.nick === "ADM";

/* ID MOD */
const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

if(!id){

  alert("Mod inválido");

  history.back();

}

/* REFERÊNCIA */
const modRef =
dbRef(db,"mods/"+id);

/* CARREGAR MOD */
const snap =
await get(modRef);

if(!snap.exists()){

  alert("Mod não encontrado");

  history.back();

}

const mod =
snap.val();

/* SEGURANÇA */
if(
  mod.autorNick !== usuario.nick
  &&
  !isADM
){

  alert("Esse mod não é seu.");

  history.back();

}

/* PREENCHER */
document.getElementById("nome")
.value = mod.nome || "";

document.getElementById("descricao")
.value = mod.descricao || "";

document.getElementById("versao")
.value = mod.versao || "";

document.getElementById("categoria")
.value = mod.categoria || "Variados";

document.getElementById("iconPreview")
.src = mod.iconURL;

/* IMAGENS */
const imgsPreview =
document.getElementById("imgsPreview");

(mod.imagens || []).forEach(img=>{

  const image =
  document.createElement("img");

  image.src = img;

  imgsPreview.appendChild(image);

});

/* VOLTAR */
window.voltar = ()=>{

  window.location.href =
  "MinhasPublicacoes.html";

};

/* SALVAR */
document.getElementById("saveBtn")
.onclick = async ()=>{

  try{

    const nome =
    document.getElementById("nome").value;

    const descricao =
    document.getElementById("descricao").value;

    const versao =
    document.getElementById("versao").value;

    const categoria =
    document.getElementById("categoria").value;

    const zip =
    document.getElementById("zip").files[0];

    const icone =
    document.getElementById("icone").files[0];

    const imagens =
    document.getElementById("imagens").files;

    let zipURL =
    mod.zipURL;

    let iconURL =
    mod.iconURL;

    let imgs =
    mod.imagens || [];

    const base =
    "mods_editados/" + Date.now();

    /* ZIP */
    if(zip){

      const zipRef =
      ref(storage,
      `${base}/arquivo.zip`);

      await uploadBytesResumable(
        zipRef,
        zip
      );

      zipURL =
      await getDownloadURL(zipRef);

    }

    /* ÍCONE */
    if(icone){

      const iconRef =
      ref(storage,
      `${base}/icon.png`);

      await uploadBytesResumable(
        iconRef,
        icone
      );

      iconURL =
      await getDownloadURL(iconRef);

    }

    /* IMAGENS */
    if(imagens.length > 0){

      imgs = [];

      for(let i=0;i<imagens.length;i++){

        const imgRef =
        ref(storage,
        `${base}/img_${i}`);

        await uploadBytesResumable(
          imgRef,
          imagens[i]
        );

        imgs.push(
          await getDownloadURL(imgRef)
        );

      }

    }

    /* TAMANHO */
    let tamanhoMB =
    mod.tamanhoMB || "0";

    if(zip){

      tamanhoMB =
      (zip.size / 1024 / 1024)
      .toFixed(2);

    }

    /* UPDATE */
    await update(modRef,{

      nome,
      descricao,
      versao,
      categoria,

      zipURL,
      iconURL,

      imagens: imgs,

      tamanhoMB,

      ultimaEdicao:
      Date.now()

    });

    alert("Mod atualizado!");

    window.location.href =
    "MinhasPublicacoes.html";

  }catch(e){

    alert(e.message);

  }

};

</script>

</body>
</html>
