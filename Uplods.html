<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Upload Mod</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  margin: auto;
}

input, textarea, select {
  width: 90%;
  margin: 8px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  background: #00c853;
  border: none;
  border-radius: 5px;
  width: 100%;
}

progress {
  width: 100%;
}
</style>
</head>
<body>

<div class="box">
  <h2>Upload de Mod</h2>

  <input type="text" id="nome" placeholder="Nome do Mod">
  <textarea id="descricao" placeholder="Descrição"></textarea>

  <input type="text" id="versao" placeholder="Versão">

  <select id="categoria">
    <option value="">Selecione a categoria</option>
    <option>Roupas</option>
    <option>Armas</option>
    <option>Veiculos</option>
    <option>Construções</option>
    <option>Variados</option>
  </select>

  <p>Arquivo ZIP:</p>
  <input type="file" id="zip" accept=".zip">

  <p>Ícone:</p>
  <input type="file" id="icone" accept="image/*">

  <p>Imagens (1 a 5):</p>
  <input type="file" id="imagens" multiple accept="image/*">

  <button id="uploadBtn">Enviar</button>

  <progress id="progress" value="0" max="100"></progress>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { getDatabase, ref as dbRef, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 COLA SEU CONFIG AQUI (Firebase Console) */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  databaseURL: "https://dayzozmbi-server-default-rtdb.firebaseio.com",
  projectId: "dayzozmbi-server",
  storageBucket: "dayzozmbi-server.firebasestorage.app",
  messagingSenderId: "221905253103",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getDatabase(app);

document.getElementById("uploadBtn").addEventListener("click", async () => {

  const nome = document.getElementById("nome").value;
  const descricao = document.getElementById("descricao").value;
  const versao = document.getElementById("versao").value;
  const categoria = document.getElementById("categoria").value;

  const zip = document.getElementById("zip").files[0];
  const icone = document.getElementById("icone").files[0];
  const imagens = document.getElementById("imagens").files;

  if (!nome || !descricao || !zip || !icone || !categoria || !versao) {
    alert("Preencha tudo!");
    return;
  }

  if (imagens.length < 1 || imagens.length > 5) {
    alert("1 a 5 imagens!");
    return;
  }

  try {

    const base = "mods/" + Date.now();

    const nomeSeguro = nome
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9 ]/g, "")
      .trim()
      .replace(/\s+/g, "_");

    const zipRef = ref(storage, `${base}/${nomeSeguro}.zip`);
    await uploadBytesResumable(zipRef, zip);
    const zipURL = await getDownloadURL(zipRef);

    const iconRef = ref(storage, base + "/icon.png");
    await uploadBytesResumable(iconRef, icone);
    const iconURL = await getDownloadURL(iconRef);

    let imgs = [];
    for (let i = 0; i < imagens.length; i++) {
      const imgRef = ref(storage, `${base}/img_${i}`);
      await uploadBytesResumable(imgRef, imagens[i]);
      imgs.push(await getDownloadURL(imgRef));
    }

    await push(dbRef(db, "mods"), {
      nome,
      descricao,
      versao,
      categoria,
      zipURL,
      iconURL,
      imagens: imgs,
      data: Date.now(),
      downloads: 0
    });

    alert("Upload concluído!");

  } catch (e) {
    alert(e.message);
  }
});
</script>

</body>
</html>
