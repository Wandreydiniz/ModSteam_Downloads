<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizar Mod</title>

<style>
body { margin: 0; font-family: Arial; background: #0b0b0b; color: white; }

/* HEADER */
.header {
  padding: 15px;
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.menu-btn {
  font-size: 22px;
  cursor: pointer;
}

/* MENU */
.sidebar {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #111;
  transition: 0.3s;
  padding-top: 20px;
  z-index: 1000;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #222;
}

.sidebar a.active {
  background: #00c853;
  color: black;
  font-weight: bold;
}

.sidebar a:hover {
  background: #1f1f1f;
}

.sidebar.open { left: 0; }

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 999;
}

.overlay.show { display: block; }

/* CONTEÚDO */
.content {
  padding: 10px;
}

.card {
  background: #151515;
  border-radius: 12px;
  overflow: hidden;
}

.card-img {
  width: 100%;
  height: 200px;
  background: #222;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-info {
  padding: 10px;
}

.card-title {
  font-size: 16px;
  font-weight: bold;
}

.card-meta {
  font-size: 12px;
  color: #aaa;
  margin-top: 5px;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: #00c853;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar" id="sidebar">
  <a href="index.html">Mods Project Zomboid</a>
  <a href="download.html">Download Project Zomboid</a>
  <a href="#">Servidores BR</a>
  <a href="#">Servidores USA</a>
  <a href="#">Discord</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  Visualizar Mod
</div>

<!-- CONTEÚDO -->
<div class="content" id="content">
  Carregando...
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://dayzozmbi-server-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

window.toggleMenu = ()=>{
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
};

// PEGAR ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
  document.getElementById("content").innerHTML = "Mod não encontrado.";
}

// BUSCAR MOD
const snap = await get(ref(db,"mods/"+id));

if(!snap.exists()){
  document.getElementById("content").innerHTML = "Mod não encontrado.";
}

const m = snap.val();

// RENDER
document.getElementById("content").innerHTML = `
  <div class="card">
    <div class="card-img">
      <img src="${m.iconURL}">
    </div>

    <div class="card-info">
      <div class="card-title">${m.nome}</div>

      <div class="card-meta">Versão ${m.versao || "N/A"}</div>
      <div class="card-meta">📥 ${m.downloads || 0}</div>

      <button onclick="baixar()">⬇ Baixar</button>

      <p style="margin-top:15px;color:#aaa;">
        ${m.descricao || ""}
      </p>
    </div>
  </div>
`;

// DOWNLOAD
window.baixar = ()=>{
  const a = document.createElement("a");
  a.href = m.zipURL;
  a.click();
};
</script>

</body>
</html>
